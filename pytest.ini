[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Output options
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals
    --tb=short
    # Pre-existing test regressions known to fail in CI's clean environment.
    # Sprint 6.1 ships the security baseline; the regressions below pre-date it
    # and are tracked in TODOS.md for follow-on sprints.
    # --- Sprint 7 LangGraph migration regressions (async + FSM state names) ---
    --ignore=tests/workflows/test_langgraph_workflow.py
    --ignore=tests/test_langgraph_persistence.py
    --ignore=tests/test_preview_extraction_workflow.py
    --ignore=tests/test_approval_bridge.py
    --ignore=tests/test_dashboard_tabs.py
    # Sprint 8 prep tests re-enabled in Sprint 8.1 (issue #30). The two real-LLM
    # integration tests in test_prompt_optimization.py are tagged with the
    # `requires_api_key` marker so the matrix CI job filters them out — they
    # need a working Anthropic account, not just a Python env.
    # Service-dependent tests run in the service-dependent-tests CI job via
    # the `requires_services` pytest marker. The base `test` job filters them
    # out with `-m "not requires_services"`. Tagged in PR-A (Sprint 6.2 tests)
    # and PR-B (older integration tests) for issue #25.
    # Two stale ignores removed: test_full_workflow_e2e.py (file deleted earlier)
    # and test_sql_adapter.py (pure SQLite unit test, wrongly classified).
    # --- LLM-quality tests (need ANTHROPIC_API_KEY in CI or have drifted expectations) ---
    --ignore=tests/test_nlp_to_sql_workflow.py
    --ignore=tests/test_case_sensitive_count_regression.py
    --ignore=tests/sql_on_fhir/test_sql_generation_quality.py
    --ignore=tests/agents/test_phenotype_agent_filtering.py
    --ignore=tests/agents/test_phenotype_agent_with_conditions.py
    # --- E2E tests (require running services + real data) ---
    --ignore=tests/e2e
    --ignore=tests/integration
    # --- Scripts directory has experimental/manual tests not meant for CI ---
    --ignore=scripts

# Test suite markers
markers =
    # Test Suites (by functionality/querying method)
    exploratory: Tests for exploratory analytics using SQL-on-FHIR ViewDefinitions
    formal: Tests for formal extraction workflow with direct DB queries
    agents: Tests for AI agents, orchestration, and handoffs
    infrastructure: Tests for infrastructure, UI, and supporting components

    # Test types
    e2e: End-to-end integration tests (slow, requires external services)
    integration: Integration tests (multiple components)
    unit: Unit tests (single component in isolation)
    performance: Performance and benchmarking tests

    # Resource requirements
    slow: Tests that take more than 30 seconds to run
    real_llm: Tests that make real LLM API calls and cost money
    real_db: Tests that require real database (HAPI FHIR or Synthea)
    hapi_db: Tests that specifically require HAPI FHIR database
    synthea_db: Tests that specifically require Synthea database

    # External dependencies
    requires_hapi: Requires HAPI FHIR server running (localhost:8081)
    requires_synthea: Requires Synthea PostgreSQL database
    requires_langsmith: Requires LangSmith tracing configuration
    requires_api_key: Requires ANTHROPIC_API_KEY environment variable
    requires_services: Requires docker-compose stack (hapi-db + hapi-fhir + redis)

    # Test categories
    sql_on_fhir: Tests for SQL-on-FHIR ViewDefinitions
    workflow: Tests for LangGraph workflow state machine
    approval: Tests for approval workflow
    extraction: Tests for data extraction
    deidentification: Tests for PHI de-identification
    ui: Tests for Streamlit UIs

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::sqlalchemy.exc.MovedIn20Warning

# Coverage
[coverage:run]
source = app
omit =
    */tests/*
    */migrations/*
    */__pycache__/*

[coverage:report]
precision = 2
skip_empty = True
show_missing = True

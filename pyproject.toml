[tool.bandit]
exclude_dirs = ["tests", "*/test_*.py", "*_test.py"]
skips = ["B101", "B601"]  # B101: assert_used (ok in tests), B601: paramiko (not used)

[tool.black]
line-length = 100
target-version = ['py310']
exclude = '''
/(
    \.eggs
  | \.git
  | \.venv
  | _build
  | build
  | dist
  | migrations
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
asyncio_mode = "auto"

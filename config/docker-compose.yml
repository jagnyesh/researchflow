version: '3.8'
services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://researchflow:researchflow@db:5432/researchflow
      - A2A_JWT_SECRET=supersecret
      - FHIR_SERVER_URL=http://hapi-fhir:8080/fhir
      # Redis Speed Layer
      - REDIS_URL=redis://redis:6379/0
      - USE_SPEED_LAYER=true
      # Audit Pipeline (Sprint 6.1 Phase 2.2 - separate Redis instance)
      - REDIS_AUDIT_URL=redis://redis-audit:6379/0
      # LangGraph Migration (Sprint 6.5 + 6.6)
      - USE_LANGGRAPH_WORKFLOW=false
      - LANGGRAPH_ROLLOUT_PCT=0
      # LangSmith Observability (optional - add your key)
      - LANGCHAIN_TRACING_V2=false
      - LANGCHAIN_PROJECT=researchflow-production
    depends_on:
      db:
        condition: service_healthy
      hapi-fhir:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-audit:
        condition: service_healthy

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: researchflow
      POSTGRES_PASSWORD: researchflow
      POSTGRES_DB: researchflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"  # Map to 5434 to avoid conflict with local PostgreSQL
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researchflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # HAPI FHIR Server with PostgreSQL backend
  # Pinned to v8.8.0 + digest (image label org.opencontainers.image.version=v8.8.0-1).
  # The dump in tests/fixtures/hapi_seed.sql.gz is generated against this exact image.
  # To upgrade: pull the new tag locally, regenerate the dump, update both this line
  # and tests/fixtures/hapi_seed.meta.json's hapi_tag field.
  hapi-fhir:
    image: hapiproject/hapi:v8.8.0@sha256:34c86fd5805df77c2b9d9c10538050b16ac3dc244352da0ebe4717f931330775
    container_name: hapi-fhir-server
    ports:
      - "8081:8080"
    environment:
      # Database configuration
      spring.datasource.url: jdbc:postgresql://hapi-db:5432/hapi
      spring.datasource.username: hapi
      spring.datasource.password: hapi
      spring.datasource.driverClassName: org.postgresql.Driver
      spring.jpa.properties.hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgres94Dialect

      # FHIR version
      hapi.fhir.fhir_version: R4

      # Server configuration
      hapi.fhir.server_address: http://localhost:8081/fhir
      hapi.fhir.allow_external_references: "true"
      hapi.fhir.allow_multiple_delete: "true"
      hapi.fhir.reuse_cached_search_results_millis: 60000

      # Performance tuning
      hapi.fhir.max_page_size: 200
      hapi.fhir.default_page_size: 20

      # Enable SQL-on-FHIR support
      hapi.fhir.bulk_export_enabled: "true"
    depends_on:
      hapi-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/fhir/metadata || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      # On a cold CI runner, HAPI's Flyway migrations against an empty hapi-db
      # plus Spring boot can take 90-120s before /fhir/metadata responds.
      # start_period gives that grace before failed checks count toward retries.
      start_period: 120s

  # PostgreSQL database for HAPI FHIR
  hapi-db:
    image: postgres:15
    container_name: hapi-postgres
    environment:
      POSTGRES_USER: hapi
      POSTGRES_PASSWORD: hapi
      POSTGRES_DB: hapi
    volumes:
      - hapi_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hapi"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis cache for Lambda Speed Layer
  redis:
    image: redis:7-alpine
    container_name: researchflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Audit pipeline Redis (Sprint 6.1 Phase 2.2 - isolated from speed layer cache)
  # noeviction policy: writes fail loudly when full instead of silently dropping
  # queued audit events. AOF persistence so the queue survives Redis restart.
  redis-audit:
    image: redis:7-alpine
    container_name: researchflow-redis-audit
    ports:
      - "6380:6379"
    volumes:
      - redis_audit_data:/data
    command: redis-server --appendonly yes --maxmemory 32mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Synthea synthetic data generator (run once to populate)
  synthea:
    image: conceptant/synthea-fhir:latest
    container_name: synthea-generator
    environment:
      # Generate 100 patients
      - POPULATION=100
      # Target HAPI FHIR server
      - FHIR_SERVER=http://hapi-fhir:8080/fhir
      # State to generate data for
      - STATE=Massachusetts
      # Seed for reproducible data
      - SEED=12345
    depends_on:
      hapi-fhir:
        condition: service_healthy
    profiles:
      - synthea  # Only run when explicitly requested

  # Legacy mock FHIR server (kept for backward compatibility)
  mock-fhir:
    image: mitre/clinical_ig_mock_server:latest
    ports:
      - "8080:8080"
    profiles:
      - legacy  # Only run when explicitly requested

volumes:
  postgres_data:
  hapi_postgres_data:
  redis_data:
  redis_audit_data:

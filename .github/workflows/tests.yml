name: Tests

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11']  # pyproject.toml: requires-python >=3.11,<3.13

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r config/requirements.txt
        pip install -r config/requirements-dev.txt

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

    - name: Check code formatting with black
      run: |
        black --check --line-length 100 app/

    - name: Type check with mypy
      run: |
        mypy app/ --ignore-missing-imports
      continue-on-error: true

    - name: Run tests with pytest
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        DATABASE_URL: sqlite+aiosqlite:///./test.db
      run: |
        pytest tests/ -v -m "not requires_services" --cov=app --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.os }}-py${{ matrix.python-version }}
        fail_ci_if_error: false

  # Service-dependent tests run against the same docker-compose stack that
  # `make docker-up` uses locally. Parallel with `test` (no `needs:`) so PR
  # feedback time stays close to the slower of the two.
  #
  # Test data comes from tests/fixtures/hapi_seed/bundle.json — a hand-curated
  # 5-patient FHIR transaction bundle that scripts/seed.sh POSTs into HAPI.
  # No pg_dump, no Synthea-in-CI: the bundle is the entire test corpus.
  service-dependent-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r config/requirements.txt
        pip install -r config/requirements-dev.txt

    # Bring up services with working in-container healthchecks first; --wait
    # gates on those. hapi-fhir is distroless (no shell/curl), so it can't
    # have a working CMD-SHELL healthcheck — start it without --wait and let
    # seed.sh poll /fhir/metadata from the host.
    - name: Bring up hapi-db, redis, redis-audit
      run: |
        docker compose -f config/docker-compose.yml up -d --wait \
          hapi-db redis redis-audit

    - name: Start hapi-fhir (no in-container healthcheck — distroless image)
      run: |
        docker compose -f config/docker-compose.yml up -d hapi-fhir

    - name: Seed HAPI with test fixture (script waits for HAPI to be ready)
      run: |
        ./scripts/seed.sh http://localhost:8081/fhir

    - name: Create materialized views
      env:
        # hapi:hapi matches POSTGRES_PASSWORD in config/docker-compose.yml — public test fixture, not a real credential.
        DATABASE_URL: postgresql+asyncpg://hapi:hapi@localhost:5433/hapi  # pragma: allowlist secret
      run: |
        python scripts/materialize_views.py --create

    - name: Run service-dependent pytest
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        DATABASE_URL: postgresql+asyncpg://hapi:hapi@localhost:5433/hapi  # pragma: allowlist secret
        REDIS_URL: redis://localhost:6379/0
      run: |
        pytest tests/ -v -m "requires_services" --tb=short

    - name: Show docker logs on failure
      if: failure()
      run: |
        docker compose -f config/docker-compose.yml logs --tail=100 hapi-db hapi-fhir redis

  security-scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit

    - name: Run safety check
      run: |
        safety check --json || true

    - name: Run bandit security scan
      run: |
        bandit -r app/ -f json -o bandit-report.json || true

    - name: Upload security scan results
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          bandit-report.json
